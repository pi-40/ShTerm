name: Append Green Repository Footnote

on:
  push:
    branches:
      - main

jobs:
  add-footnote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Check and Append Green Footnote
        run: |
          NOTE='<img src="https://shields.io" alt="Program Info">'
          
          if ! grep -Fq "this%20program%20was%20made%20in%20cs" README.md; then
            echo -e "\n---\n$NOTE" >> README.md
            echo "Green footnote injected successfully."
          else
            echo "Footnote already exists. Skipping."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "chore: automated green footer update"
            git push
          fi
