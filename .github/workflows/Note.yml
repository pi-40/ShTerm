name: Update README Note

on:
  push:
    branches:
      - main # Change this to your default branch if it is different (e.g., master)

jobs:
  append-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append C# Note to README
        run: |
          # Ensure README.md exists
          touch README.md
          
          # Add a newline and the specific note to the bottom
          echo -e "\n> [!NOTE]\n> this program was written in csharp" >> README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: automatically add C# note to README" || echo "No changes to commit"
          git push
