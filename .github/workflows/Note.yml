name: Append Multicolor Footnote

on:
  push:
    branches:
      - main

jobs:
  add-footnote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Check and Append Footnote
        run: |
          TEXT="this program was made in cs"
          GREEN_TEXT="$\color{green}{\text{this program was}}$"
          ORANGE_TEXT="$\color{orange}{\text{ made in cs}}$"
          
          if ! grep -Fq "this program was made in cs" README.md; then
            echo -e "\n---\n$GREEN_TEXT$ORANGE_TEXT" >> README.md
            echo "Footnote injected successfully."
          else
            echo "Footnote already exists. Skipping."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          
          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "chore: automated multicolor footer update"
            git push
          fi
