name: Update README Note

on:
  push:
    branches:
      - main

jobs:
  append-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append C# Note to README
        run: |
          touch README.md
          echo -e "\n\`\`\`diff\n+ this program was written in csharp\n\`\`\`" >> README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update readme note" || echo "No changes to commit"
          git push
