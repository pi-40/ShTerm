name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Dependencies
      run: dotnet restore shterm.slnx

    - name: Build Solution
      run: dotnet build shterm.slnx --configuration Release --no-restore

    - name: Run Tests
      run: dotnet test shterm.slnx --configuration Release --no-build --verbosity normal
