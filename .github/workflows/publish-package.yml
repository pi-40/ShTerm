name: Publish Release ZIP to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://github.com'
          scope: '@pi-40'

      - name: Download Release ZIP
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ZIP_URL="https://github.com"
          else
            ZIP_URL=$(jq -r '.release.assets[] | select(.name | endswith(".zip")) | .url' $GITHUB_EVENT_PATH)
          fi
          
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               -L -o ShTerm.zip "$ZIP_URL"

      - name: Build Package Archive
        run: |
          mkdir package
          unzip ShTerm.zip -d package/
          
          # Creates the target configuration file automatically on the fly
          cat <<EOF > package/package.json
          {
            "name": "@pi-40/shterm",
            "version": "1.0.0",
            "description": "ShTerm package",
            "main": "index.js",
            "publishConfig": {
              "registry": "https://github.com"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com"
            }
          }
          EOF
          
          tar -czf shterm-package.tgz package/

      - name: Push to GitHub Packages
        run: npm publish shterm-package.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
