name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Download Release ZIP
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ZIP_URL="https://github.com"
          else
            ZIP_URL=$(jq -r '.release.assets[] | select(.name | endswith(".zip")) | .url' $GITHUB_EVENT_PATH)
          fi
          
          curl -L -o ShTerm.zip "$ZIP_URL"

      - name: Register Universal Package
        run: |
          mkdir -p output
          mv ShTerm.zip output/
          echo "ShTerm universal platform binary distribution" > output/README.md

      - name: Upload Package to GitHub Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: ShTerm-Universal-Package
          path: output/
