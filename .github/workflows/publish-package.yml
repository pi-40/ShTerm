name: Publish Release ZIP to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Release ZIP
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ZIP_URL="https://github.com"
          else
            ZIP_URL=$(jq -r '.release.assets[] | select(.name | endswith(".zip")) | .url' $GITHUB_EVENT_PATH)
          fi
          
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/octet-stream" \
               -L -o ShTerm.zip "$ZIP_URL"

      - name: Create NuGet Package Manifest
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CLEAN_VERSION="1.0.0"
          else
            CLEAN_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          fi
          
          cat <<EOF > ShTerm.nuspec
          <?xml version="1.0"?>
          <package>
            <metadata>
              <id>ShTerm</id>
              <version>${CLEAN_VERSION}</version>
              <authors>pi-40</authors>
              <owners>pi-40</owners>
              <description>ShTerm release artifact binary package</description>
              <repository type="git" url="https://github.com" />
            </metadata>
            <files>
              <file src="ShTerm.zip" target="content/" />
            </files>
          </package>
          EOF

      - name: Pack NuGet Package
        run: dotnet pack ShTerm.nuspec -o out

      - name: Configure NuGet Authentication
        run: |
          cat <<EOF > nuget.config
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="github" value="https://github.com" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="pi-40" />
                <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF

      - name: Push to GitHub Packages
        run: dotnet nuget push out/*.nupkg --source "github" --skip-duplicate
