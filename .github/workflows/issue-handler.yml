name: Issue Handler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  manage_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Bot triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Disable strict exit errors so warnings do not stop the bot
          set +e

          # Ensure the issue tracker works even if body is empty
          SAFE_BODY="${ISSUE_BODY:-empty}"
          TEXT_BLOCK=$(echo "$SAFE_BODY" | tr '[:upper:]' '[:lower:]')

          # Determine labels natively
          LABEL="triage"
          COLOR="65717B"
          
          if [[ "$TEXT_BLOCK" == *"bug"* || "$TEXT_BLOCK" == *"error"* ]]; then
            LABEL="bug"
            COLOR="D93F0B"
          elif [[ "$TEXT_BLOCK" == *"feature"* || "$TEXT_BLOCK" == *"add"* ]]; then
            LABEL="enhancement"
            COLOR="A2EEEF"
          fi

          # Run CLI processes with suppressed error handling
          gh issue edit "$ISSUE_NUMBER" --add-assignee "pi-40" 2>/dev/null
          gh label create "$LABEL" --color "$COLOR" --force 2>/dev/null
          gh issue edit "$ISSUE_NUMBER" --add-label "$LABEL" 2>/dev/null

          # Drop the confirmation comment
          MESSAGE="Thank you for opening an issue on ShTerm. The project owner has been assigned to look into this report. Please ensure you have included your Windows version and terminal logs."
          gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null

          # Force a clean green checkmark exit code
          exit 0
