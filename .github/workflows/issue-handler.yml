name: Issue Handler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  manage_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Bot triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Assign the repository owner to the issue
          gh issue edit "$ISSUE_NUMBER" --add-assignee "pi-40"

          # 2. Extract lowercased text safely to find tags
          TEXT_BLOCK=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')

          # 3. Assess matching labels without breaking
          LABEL="triage"
          if [[ "$TEXT_BLOCK" == *"bug"* || "$TEXT_BLOCK" == *"error"* ]]; then
            LABEL="bug"
          elif [[ "$TEXT_BLOCK" == *"feature"* || "$TEXT_BLOCK" == *"add"* ]]; then
            LABEL="enhancement"
          fi

          # 4. Attach the determined system label
          gh issue edit "$ISSUE_NUMBER" --add-label "$LABEL"

          # 5. Drop a clean confirmation comment
          MESSAGE="Thank you for opening an issue on ShTerm. The project owner has been assigned to look into this report. Please ensure you have included your Windows version and terminal logs."
          gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE"
