name: Issue Handler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  manage_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Bot triage
        # This forces the shell to completely ignore errors for the entire block
        shell: bash {0} 
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Ensure the issue tracker works even if body is empty
          SAFE_BODY="${ISSUE_BODY:-empty}"
          TEXT_BLOCK=$(echo "$SAFE_BODY" | tr '[:upper:]' '[:lower:]')

          # Determine labels natively
          LABEL="triage"
          COLOR="65717B"
          
          if [[ "$TEXT_BLOCK" == *"bug"* || "$TEXT_BLOCK" == *"error"* ]]; then
            LABEL="bug"
            COLOR="D93F0B"
          elif [[ "$TEXT_BLOCK" == *"feature"* || "$TEXT_BLOCK" == *"add"* ]]; then
            LABEL="enhancement"
            COLOR="A2EEEF"
          fi

          # Added || true so the shell registers a success even if the GH CLI errors out
          gh issue edit "$ISSUE_NUMBER" --add-assignee "pi-40" 2>/dev/null || true
          gh label create "$LABEL" --color "$COLOR" --force 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --add-label "$LABEL" 2>/dev/null || true

          # Drop the confirmation comment
          MESSAGE="Thank you for opening an issue on ShTerm. The project owner has been assigned to look into this report. Please ensure you have included your Windows version and terminal logs."
          gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE" 2>/dev/null || true

          exit 0
